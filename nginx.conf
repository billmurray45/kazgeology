upstream django {
    server web:8000;
}

# HTTP: serve ACME challenge, redirect everything else to https (non-www)
server {
    listen 80;
    server_name kazgeology.kz www.kazgeology.kz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://kazgeology.kz$request_uri;
    }
}

# HTTPS www -> non-www
server {
    listen 443 ssl;
    server_name www.kazgeology.kz;

    ssl_certificate     /etc/letsencrypt/live/kazgeology.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kazgeology.kz/privkey.pem;

    return 301 https://kazgeology.kz$request_uri;
}

# HTTPS main site (non-www)
server {
    listen 443 ssl;
    server_name kazgeology.kz;

    ssl_certificate     /etc/letsencrypt/live/kazgeology.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kazgeology.kz/privkey.pem;

    client_max_body_size 25M;

    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /media/ {
        alias /var/www/media/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
