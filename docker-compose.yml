services:
  postgres:
    image: postgres:16
    container_name: kazgeology_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kazgeology_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build: .
    container_name: kazgeology_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    volumes:
      - static_data:/code/var/static
      - media_data:/code/var/media
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kazgeology_network

  nginx:
    image: nginx:1.27-alpine
    container_name: kazgeology_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
    depends_on:
      - web
    networks:
      - kazgeology_network
    # Reload nginx every 6h to pick up renewed certs
    command: >
      sh -c "nginx -g 'daemon off;' &
             while :; do sleep 6h; nginx -s reload; done"

  certbot:
    image: certbot/certbot:latest
    container_name: kazgeology_certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Attempt renewal twice a day (no-op until cert is within 30 days of expiry)
    entrypoint: >
      sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"
    networks:
      - kazgeology_network

volumes:
  postgres_data:
    driver: local
  static_data:
    driver: local
  media_data:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local

networks:
  kazgeology_network:
    driver: bridge
