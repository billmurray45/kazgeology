<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка сервера — Казгеология</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            color: #1e293b;
            padding: 20px;
            text-align: center;
        }
        .box { max-width: 560px; }
        .code {
            font-size: 140px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -4px;
        }
        h1 { font-size: 30px; font-weight: 800; margin: 20px 0 14px; }
        p { font-size: 18px; color: #64748b; line-height: 1.6; margin-bottom: 32px; }
        a {
            display: inline-block;
            background: #1e293b;
            color: #fff;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: 700;
            text-decoration: none;
        }
        a:hover { background: #0f172a; }
        @media (max-width: 767px) {
            .code { font-size: 96px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="code">500</div>
        <h1>Внутренняя ошибка сервера</h1>
        <p>
            Произошла непредвиденная ошибка. Мы уже работаем над её устранением.
            Пожалуйста, попробуйте позже.
        </p>
        <a href="/">На главную</a>
    </div>
</body>
</html>
